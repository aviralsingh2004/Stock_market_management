<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="bg-gray-900 bg-gradient-radial from-gray-700 via-gray-800 to-gray-900 flex justify-center items-center min-h-screen">

      <div  class=" bg-gray-600 
      rounded-lg p-8 
      shadow-2xl
      max-w-md w-full
      
      
      ">
        <h2  class="text-center 
        font-bold
         text-3xl
         text-white
        
        ">Login</h2>
        <form action="/formPost" class="form"
          method="post">
            <div class="text-pretty mb-4">
                <label 
                class="block 
                text-sm
                font-medium
                text-gray-300
                "
                for="email"
                >Email</label>
                <input 
                class="
                w-full
                px-3
                py-2
                bg-gray-500
                border-gray-900
                rounded-md
                text-white
                focus:ring-2

                "
                type="email" name="Email" id=" " placeholder="Email">
            </div>
            <div>
                <label 
                class="block 
                text-sm
                font-medium
                text-gray-300
               
                for="password"
                >Password</label>
                <input 
                class="
                w-full
                px-3
                py-2
                bg-gray-500
                border-gray-900
                rounded-md
                mb-6

                type="password" name="Email" id=" " placeholder="Password">
            </div>
            
            <button 
            type="submit "
        
            id="loginButton"
            class="w-4/12 bg-blue-700 
            pxs-1
            py-1
            rounded-md
            text-white
            hover:bg-blue-800
            shadow-2xl
            "
              
            >Login</button>
            <button 
            
            type="button" 
            id="signUpButton" 
            class="w-4/12 
            bg-blue-700 
            pxs-1 py-1 rounded-md
            text-white 
            hover:bg-blue-800 
            shadow-2xl">
                    Register
            </button>

         
        </form>
      </div>

      <script src="index.js"></script>

</body>
</html>
